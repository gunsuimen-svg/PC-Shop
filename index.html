    <meta charset="UTF-8">

    <title>Магазин компьютеров</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 0; background: #f0f0f0; }
        nav { background: #2c3e50; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        header { background: #34495e; color: white; padding: 30px; text-align: center; margin-top: 0; }
        .container { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 20px; }
        aside { background: white; padding: 15px; width: 200px; border-radius: 8px; }
        main { background: white; padding: 20px; flex: 1; border-radius: 8px; }
        .products { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .card { border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 8px; }
        .card img { max-width: 100%; height: 120px; background: #ddd; }
        .price { color: #e74c3c; font-weight: bold; font-size: 18px; }
        button { background: #3498db; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 20px; margin-top: 30px; }
        @media (max-width: 700px) { .container { flex-direction: column; } aside { width: auto; } .products { grid-template-columns: 1fr; } }
    </style>
</head>
